name: Android CI – Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jumping-gianluigi-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # Only create a GitHub Release when merging to main
      - name: Create GitHub Release with APK
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          TAG="v1.0-build-${{ github.run_number }}"
          gh release create "$TAG" "$APK" \
            --repo "${{ github.repository }}" \
            --title "Build #${{ github.run_number }}" \
            --notes "APK debug auto-généré depuis le commit ${{ github.sha }}" \
            --prerelease
