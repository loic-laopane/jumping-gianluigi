name: Android CI – Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK (ensure API 34 is present)
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install required SDK platforms
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jumping-mbappe-build-${{ github.run_number }}
          path: app/build/outputs/apk/debug/jumping-mbappe-debug.apk
          retention-days: 30

      # Only create a GitHub Release when merging to main
      - name: Create GitHub Release with APK
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK="app/build/outputs/apk/debug/jumping-mbappe-debug.apk"
          TAG="v1.0-build-${{ github.run_number }}"
          gh release create "$TAG" "$APK" \
            --repo "${{ github.repository }}" \
            --title "Build #${{ github.run_number }}" \
            --notes "APK debug auto-généré depuis le commit ${{ github.sha }}" \
            --prerelease
